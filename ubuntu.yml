---
- name: Preparing Workstation
  hosts: localhost
  connection: local
  
  vars:
    # Configurações globais de download para as ferramentas nativas
    gomplate_version: "v5.1.0"
    stern_version: "1.34.0"
    
    # Destino e origem do Google Antigravity
    install_path: "/usr/local/bin/anti-gravity"
    download_url: "https://storage.googleapis.com/antigravity-public/antigravity-hub/2.0.11-6560309696135168/linux-x64/Antigravity.tar.gz"

  tasks:

    - name: FAXINA TOTAL E CIRÚRGICA DE ENTRADAS DE REPOSITÓRIO CORROMPIDAS
      become: true
      ansible.builtin.shell:
        cmd: |
          # Remove arquivos residuais criados em tentativas passadas
          rm -f /etc/apt/sources.list.d/google*
          rm -f /etc/apt/sources.list.d/brave*
          
          # Remove a linha corrompida de qualquer arquivo de configuração (.list ou .sources) no sistema
          find /etc/apt/ -type f \( -name "*.list" -o -name "*.sources" \) -exec sed -i '\,https://google.com,d' {} +
          find /etc/apt/ -type f \( -name "*.list" -o -name "*.sources" \) -exec sed -i '\,http://google.com,d' {} +
      changed_when: true

    - name: Installing Linux Apps
      become: true
      ansible.builtin.apt:
        name: '{{ item }}'
        install_recommends: yes
        state: present
        update_cache: yes
      loop:
        - vim
        - htop
        - curl
        - wget
        - ncdu
        - tree
        - apt-transport-https
        - ca-certificates
        - gnupg
        - make
        - git
        - python3-pip    
        - python3-psutil 
        - bash-completion
        - gnupg-agent
        - zsh
        - flameshot
        - fonts-hack
        - tilix
        - plocate
        - jq
        - mtr

    - block:
        - name: Ensure Oh-My-Zsh and core directories exist
          ansible.builtin.file:
            path: "{{ item }}"
            state: directory
            mode: '0755'
          loop:
            - "/home/{{ ansible_user_id }}/.oh-my-zsh"
            - "/home/{{ ansible_user_id }}/.oh-my-zsh/completions"
            - "/home/{{ ansible_user_id }}/.oh-my-zsh/custom/plugins/zsh-autosuggestions"
            - "/home/{{ ansible_user_id }}/.oh-my-zsh/custom/plugins/zsh-syntax-highlighting"

        - name: Injetar e configurar o .zshrc localmente
          ansible.builtin.copy:
            dest: "/home/{{ ansible_user_id }}/.zshrc"
            content: |
              export ZSH="$HOME/.oh-my-zsh"
              ZSH_THEME="agnoster"
              plugins=(git zsh-autosuggestions zsh-syntax-highlighting)
              for plugin ($plugins); do
                if [ -f "$ZSH/custom/plugins/$plugin/$plugin.zsh" ]; then
                  source "$ZSH/custom/plugins/$plugin/$plugin.zsh"
                fi
