---
- name: Preparing Workstation
  hosts: localhost
  connection: local
  
  vars:
    # Configurações globais de download
    gomplate_version: "v5.1.0"
    stern_version: "1.34.0"
    
    # Destino e origem do Google Antigravity
    install_path: "/usr/local/bin/anti-gravity"
    download_url: "https://antigravity.google"

  tasks:

    - name: Installing Linux Apps
      become: true
      ansible.builtin.apt:
        name: '{{ item }}'
        install_recommends: yes
        state: present
      loop:
        - vim
        - htop
        - curl
        - wget
        - ncdu
        - tree
        - apt-transport-https
        - ca-certificates
        - gnupg
        - make
        - git
        - bash-completion
        - gnupg-agent
        - zsh
        - flameshot
        - fonts-hack
        - tilix
        - plocate  # Corrigido mlocate para plocate
        - jq
        - mtr

    - block:
        - name: Verify if Oh-My-zsh is installed
          ansible.builtin.stat:
            path: "/home/{{ ansible_user_id }}/.oh-my-zsh"
          register: ohmyzsh_dir

        - name: Installing Oh-My-zsh
          ansible.builtin.shell:
            cmd: 'curl -fsL https://githubusercontent.com | bash'
          when: not ohmyzsh_dir.stat.exists

        - name: Ensure .zshrc template exists before editing
          ansible.builtin.copy:
            src: "/home/{{ ansible_user_id }}/.oh-my-zsh/templates/zshrc.zsh-template"
            dest: "/home/{{ ansible_user_id }}/.zshrc"
            remote_src: yes
            force: no
            mode: '0644'

        - name: Changing Default Shell to ZSH
          become: yes
          ansible.builtin.user: 
            name: '{{ ansible_user_id }}'
            shell: /bin/zsh 

        - name: Changing Default ZSH Theme to Agnoster
          ansible.builtin.lineinfile:
            path: /home/{{ ansible_user_id }}/.zshrc
            regexp: '^ZSH_THEME='
            line: 'ZSH_THEME="agnoster"'

        - name: Creating ZSH Completion folder
          ansible.builtin.file:
            path: /home/{{ ansible_user_id }}/.oh-my-zsh/completions
            state: directory
            mode: '0755'

        - name: Adding autoload to compinit
          ansible.builtin.lineinfile:
            path: /home/{{ ansible_user_id }}/.zshrc
            line: 'autoload -U compinit && compinit'
            state: present

        - name: Install zsh-autosuggestions plugin
          ansible.builtin.git:
            repo: 'https://github.com'
            dest: '/home/{{ ansible_user_id }}/.oh-my-zsh/custom/plugins/zsh-autosuggestions'
            depth: 1

        - name: Install zsh-syntax-highlighting plugin
          ansible.builtin.git:
            repo: 'https://github.com'
            dest: '/home/{{ ansible_user_id }}/.oh-my-zsh/custom/plugins/zsh-syntax-highlighting'
            depth: 1

        - name: Enable plugins in .zshrc
          ansible.builtin.lineinfile:
            path: /home/{{ ansible_user_id }}/.zshrc
            regexp: '^plugins=\((?!.*zsh-autosuggestions)(?!.*zsh-syntax-highlighting).*'
            line: 'plugins=(git zsh-autosuggestions zsh-syntax-highlighting)'
            state: present

    - name: Configurar Tilix de forma automatizada (Opção 2 - Dracula Premium para 4K)
      community.general.dconf:
        key: "/com/gexperts/Tilix/profiles/2b7c4080-0ddd-46c5-8f23-563fd3ba78c5/{{ item.key }}"
        value: "{{ item.value }}"
        state: present
      loop:
        - { key: 'font', value: "'Hack 13'" }
        - { key: 'use-system-font', value: "false" }
        - { key: 'use-theme-colors', value: "false" }
        - { key: 'background-color', value: "'#282A36'" }
        - { key: 'foreground-color', value: "'#F8F8F2'" }
        - { key: 'palette', value: "['#21222C', '#FF5555', '#50FA7B', '#F1FA8C', '#BD93F9', '#FF79C6', '#8BE9FD', '#F8F8F2', '#6272A4', '#FF6E6E', '#69FF94', '#FFFFA5', '#D6ACFF', '#FF92DF', '#A4FFFF', '#FFFFFF']" }
        - { key: 'cell-height-modifier', value: "1.2" }
        - { key: 'cell-width-modifier', value: "1.0" }
        - { key: 'terminal-bell', value: "false" }

    - block:
        - name: Install Google Key
          become: true
          ansible.builtin.apt_key: 
            url: 'https://google.com'
            state: present

        - name: Install Google Repository
          become: true
          ansible.builtin.apt_repository:
            repo: 'deb [arch=amd64] http://google.com stable main'
            state: present
            filename: google-chrome

        - name: Install Google Chrome
          become: true
          ansible.builtin.apt:
            name: google-chrome-stable
            state: present

    - block:
        - name: Installing gomplate (Latest Release v5.1.0)
          become: true
          ansible.builtin.get_url:    
            url: "https://github.com{{ gomplate_version }}/gomplate_linux-amd64"
            dest: /usr/local/bin/gomplate
            mode: "0755"

    - block:
        - name: Download and Unarchive Stern (Latest Release v1.34.0)
          become: true
          ansible.builtin.unarchive:
            src: "https://github.com{{ stern_version }}/stern_{{ stern_version }}_linux_amd64.tar.gz"
            dest: /usr/local/bin/
            remote_src: yes
            extra_opts: [--strip-components=0]
            owner: root
            group: root
            mode: "0755"

    - block: 
        - name: Install Brave Key
          become: true
          ansible.builtin.apt_key:
            url: 'https://brave.com'
            state: present

        - name: Install Brave Repository
          become: true
          ansible.builtin.apt_repository:
            repo: 'deb [arch=amd64] https://brave.com stable main'
            state: present
            filename: brave

        - name: Install Brave Browser
          become: true
          ansible.builtin.apt:
            name: brave-browser
            state: present

    - block:
        - name: Adding Ulauncher Repository
          become: true
          ansible.builtin.apt_repository:
            repo: 'ppa:agornostal/ulauncher'

        - name: Install Ulauncher
          become: true
          ansible.builtin.apt:
            name: ulauncher
            state: present

    - block:
        - name: Download the Google Antigravity Linux binary
          become: true
          ansible.builtin.get_url:
            url: "{{ download_url }}"
            dest: "{{ install_path }}"
            mode: '0755'
            owner: root
            group: root
          register: download_result

        - name: Verify Antigravity CLI installation
          ansible.builtin.command: anti-gravity --version
          register: version_check
          changed_when: false
          failed_when: version_check.rc != 0

        - name: Display installed version
          ansible.builtin.debug:
            msg: "Google Antigravity successfully installed. Version: {{ version_check.stdout }}"

        - name: Remind user of mandatory user authentication
          ansible.builtin.debug:
            msg: "Important: Run 'anti-gravity auth login' to authenticate with your Google Account."
