---
- name: Preparing Workstation
  hosts: localhost
  connection: local
  
  vars:
    # Configurações globais de download para as ferramentas nativas
    gomplate_version: "v5.1.0"
    stern_version: "1.34.0"
    
    # IMPORTANTE: Altere apenas o nome do seu usuário padrão aqui se não for 'vm1'
    target_user: "vm1"
    user_home: "/home/{{ target_user }}"
    
    # Destino e origem do Google Antigravity
    install_path: "/usr/local/bin/anti-gravity"
    download_url: "https://storage.googleapis.com/antigravity-public/antigravity-hub/2.0.11-6560309696135168/linux-x64/Antigravity.tar.gz"

  tasks:

    - name: FAXINA TOTAL E CIRÚRGICA DE ENTRADAS DE REPOSITÓRIO CORROMPIDAS
      ansible.builtin.shell:
        cmd: |
          # Remove arquivos residuais criados em tentativas passadas
          rm -f /etc/apt/sources.list.d/google*
          rm -f /etc/apt/sources.list.d/brave*
          
          # Remove a linha corrompida de qualquer arquivo de configuração (.list ou .sources) no sistema
          find /etc/apt/ -type f \( -name "*.list" -o -name "*.sources" \) -exec sed -i '\,https://google.com,d' {} +
          find /etc/apt/ -type f \( -name "*.list" -o -name "*.sources" \) -exec sed -i '\,http://google.com,d' {} +
      changed_when: true

    - name: Installing Linux Apps
      ansible.builtin.apt:
        name: '{{ item }}'
        install_recommends: yes
        state: present
        update_cache: yes
      loop:
        - vim
        - htop
        - curl
        - wget
        - ncdu
        - tree
        - apt-transport-https
        - ca-certificates
        - gnupg
        - make
        - git
        - python3-pip    
        - python3-psutil 
        - bash-completion
        - gnupg-agent
        - zsh
        - flameshot
        - fonts-hack
        - tilix
        - plocate
        - jq
        - mtr

    - block:
        - name: Ensure Oh-My-Zsh and core directories exist
          ansible.builtin.file:
            path: "{{ item }}"
            state: directory
            mode: '0755'
            owner: "{{ target_user }}"
            group: "{{ target_user }}"
          loop:
            - "{{ user_home }}/.oh-my-zsh"
            - "{{ user_home }}/.oh-my-zsh/completions"
            - "{{ user_home }}/.oh-my-zsh/custom/plugins/zsh-autosuggestions"
            - "{{ user_home }}/.oh-my-zsh/custom/plugins/zsh-syntax-highlighting"

        - name: Injetar e configurar o .zshrc localmente
          ansible.builtin.copy:
            dest: "{{ user_home }}/.zshrc"
            owner: "{{ target_user }}"
            group: "{{ target_user }}"
            content: |
              export ZSH="$HOME/.oh-my-zsh"
              ZSH_THEME="agnoster"
              plugins=(git zsh-autosuggestions zsh-syntax-highlighting)
              for plugin ($plugins); do
                if [ -f "$ZSH/custom/plugins/$plugin/$plugin.zsh" ]; then
                  source "$ZSH/custom/plugins/$plugin/$plugin.zsh"
                fi
              done
              autoload -U compinit && compinit
            mode: '0644'
            force: no

        - name: Injetar inicializador do zsh-autosuggestions
          ansible.builtin.copy:
            dest: "{{ user_home }}/.oh-my-zsh/custom/plugins/zsh-autosuggestions/zsh-autosuggestions.zsh"
            owner: "{{ target_user }}"
            group: "{{ target_user }}"
            content: |
              if (( $+ZSH_VERSION )); then
                autoload -U add-zsh-hook
                _zsh_autosuggestions_init() {
                  bindkey '^[^[[C' forward-word
                  bindkey '^E' end-of-line
                }
                add-zsh-hook precmd _zsh_autosuggestions_init
              fi
            mode: '0644'

        - name: Injetar inicializador do zsh-syntax-highlighting
          ansible.builtin.copy:
            dest: "{{ user_home }}/.oh-my-zsh/custom/plugins/zsh-syntax-highlighting/zsh-syntax-highlighting.zsh"
            owner: "{{ target_user }}"
            group: "{{ target_user }}"
            content: |
              ZSH_HIGHLIGHT_STYLES[command]='fg=green,bold'
              ZSH_HIGHLIGHT_STYLES[alias]='fg=cyan,bold'
              ZSH_HIGHLIGHT_STYLES[path]='fg=blue,underline'
            mode: '0644'

        - name: Changing Default Shell to ZSH
          ansible.builtin.user: 
            name: '{{ target_user }}'
            shell: /bin/zsh 

    - name: Configurar Tilix de forma automatizada (Opção 2 - Dracula Premium para 4K)
      become: true
      become_user: "{{ target_user }}"
      community.general.dconf:
        key: "/com/gexperts/Tilix/profiles/2b7c4080-0ddd-46c5-8f23-563fd3ba78c5/{{ item.key }}"
        value: "{{ item.value }}"
        state: present
      loop:
        - { key: 'font', value: "'Hack 13'" }
        - { key: 'use-system-font', value: "false" }
        - { key: 'use-theme-colors', value: "false" }
        - { key: 'background-color', value: "'#282A36'" }
        - { key: 'foreground-color', value: "'#F8F8F2'" }
        - { key: 'palette', value: "['#21222C', '#FF5555', '#50FA7B', '#F1FA8C', '#BD93F9', '#FF79C6', '#8BE9FD', '#F8F8F2', '#6272A4', '#FF6E6E', '#69FF94', '#FFFFA5', '#D6ACFF', '#FF92DF', '#A4FFFF', '#FFFFFF']" }
        - { key: 'cell-height-modifier', value: "1.2" }
        - { key: 'cell-width-modifier', value: "1.0" }
        - { key: 'terminal-bell', value: "false" }

    - name: Garantir pasta segura para Chaves GPG
      ansible.builtin.file:
        path: /etc/apt/keyrings
        state: directory
        mode: '0755'

    - block:
        - name: Baixar chave oficial do Google Chrome
          ansible.builtin.get_url:
            url: 'https://dl.google.com/linux/linux_signing_key.pub'
            dest: /tmp/google-chrome.pub
            mode: '0644'

        - name: Descompactar e de-armar chave publica para binario GPG moderno
          ansible.builtin.shell:
            cmd: "gpg --dearmor < /tmp/google-chrome.pub > /etc/apt/keyrings/google-chrome.gpg"
            creates: /etc/apt/keyrings/google-chrome.gpg

        - name: Criar arquivo do repositorio do Google Chrome nativamente
          ansible.builtin.copy:
            dest: /etc/apt/sources.list.d/google-chrome.list
            content: "deb [arch=amd64 signed-by=/etc/apt/keyrings/google-chrome.gpg] http://dl.google.com/linux/chrome/deb/ stable main"
            mode: '0644'

        - name: Atualizar cache e instalar Google Chrome
          ansible.builtin.apt:
            name: google-chrome-stable
            state: present
            update_cache: yes

    - block:
        - name: Installing gomplate (Latest Release v5.1.0)
          ansible.builtin.get_url:    
            url: "https://github.com/hairyhenderson/gomplate/releases/download/{{ gomplate_version }}/gomplate_linux-amd64"
            dest: /usr/local/bin/gomplate
            mode: "0755"

    - block:
        - name: Download and Unarchive Stern (Latest Release v1.34.0)
          ansible.builtin.unarchive:
            src: "https://github.com/stern/stern/releases/download/v{{ stern_version }}/stern_{{ stern_version }}_linux_amd64.tar.gz"
            dest: /usr/local/bin/
            remote_src: yes
            extra_opts: [--strip-components=0]
            owner: root
            group: root
            mode: "0755"

    - block: 
        - name: Baixar chave oficial do Brave Browser
          ansible.builtin.get_url:
            url: 'https://brave-browser-apt-release.s3.brave.com/brave-browser-archive-keyring.gpg'
            dest: /etc/apt/keyrings/brave-browser.gpg
            mode: '0644'

        - name: Criar arquivo do repositorio do Brave nativamente
          ansible.builtin.copy:
            dest: /etc/apt/sources.list.d/brave.list
            content: "deb [arch=amd64 signed-by=/etc/apt/keyrings/brave-browser.gpg] https://brave-browser-apt-release.s3.brave.com/ stable main"
            mode: '0644'

        - name: Atualizar cache e instalar Brave Browser
          ansible.builtin.apt:
            name: brave-browser
            state: present
            update_cache: yes

    - block:
        - name: Adding Ulauncher Repository
          ansible.builtin.apt_repository:
            repo: 'ppa:agornostal/ulauncher'

        - name: Install Ulauncher
          ansible.builtin.apt:
            name: ulauncher
            state: present

    - block:
        - name: Garantir que o diretório de destino do Antigravity existe
          ansible.builtin.file:
            path: "/opt/antigravity"
            state: directory
            mode: '0755'
            owner: root
            group: root

        - name: Baixar e descompactar o Google Antigravity Hub via URL
          ansible.builtin.unarchive:
            src: "{{ download_url }}"
            dest: "/opt/antigravity/"
            remote_src: yes
            owner: root
            group: root
            extra_opts: [--strip-components=1]

        - name: Criar link simbólico para o executável principal no PATH
          ansible.builtin.file:
            src: "/opt/antigravity/antigravity"
            dest: "{{ install_path }}"
            state: link
            force: yes

        - name: Verify Antigravity CLI installation
          ansible.builtin.command: "anti-gravity --version"
          register: version_check
          changed_when: false
          failed_when: version_check.rc != 0

        - name: Display installed version
          ansible.builtin.debug:
            msg: "Google Antigravity successfully installed. Version: {{ version_check.stdout }}"

        - name: Remind user of mandatory user authentication
          ansible.builtin.debug:
            msg: "Important: Run 'anti-gravity auth login' to authenticate with your Google Account."
